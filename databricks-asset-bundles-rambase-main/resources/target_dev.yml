targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-5964962121802975.15.azuredatabricks.net
    variables:
      external_rambase_catalog_name:
        description: "Name for the catalog of the external rambase database (default test environment value)"
        default: "alme_rambase_sql_tst"
      view_based_rambase_catalog_name:
        description: "Name for the catalog of the view-based external rambase database (default test environment value)"
        default:  "alme_safety_ambs_tst"