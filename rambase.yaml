- table_name: v_user_role_status
  uc_catalog: alme_safety_ambs_prd
  uc_schema: rambase
  table_comment: View for user role status
  view_definition: >
    SELECT
      user_id,
      role_id,
      CASE
        WHEN
          COUNT(*) = COUNT(
            CASE
              WHEN reading_status = 'read' THEN 1
            END
          )
        THEN
          '1'
        WHEN
          1 <= COUNT(
            CASE
              WHEN reading_status = 'readDateExpired' THEN 1
            END
          )
        THEN
          '0'
        WHEN
          1 <= COUNT(
            CASE
              WHEN reading_status = 'readDateCloseToExpiry' THEN 1
            END
          )
        THEN
          '2'
      END AS role_status
    FROM
      alme_rambase_sql_prd.dbo.competence
    GROUP BY
      user_id,
      role_id

