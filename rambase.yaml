- table_name: v_woc_observed
  uc_catalog: alme_safety_ambs_prd
  uc_schema: rambase
  table_comment:
  view_definition: >
      SELECT
          uwoc.woc_id,
          uwoc.user_id AS observed_id,
          CONCAT(u2.first_name, ' ', u2.last_name) AS observed,
          d.name as department_name
      FROM alme_rambase_sql_prd.dbo.user_woc uwoc
      LEFT JOIN alme_rambase_sql_prd.dbo.users u2
      ON uwoc.user_id = u2.id
     LEFT JOIN alme_rambase_sql_prd.dbo.cmpt_user_company_branch_connection ucbc
      ON uwoc.user_id = ucbc.user_id
      LEFT JOIN alme_rambase_sql_prd.dbo.cmpt_company_branches ccb
      ON ucbc.company_branch_id = ccb.id
      LEFT JOIN alme_rambase_sql_prd.dbo.cmpt_departments d
      ON ccb.department_id = d.id

